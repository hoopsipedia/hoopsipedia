<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <!-- Mask base shape -->
  <path d="M100 10 C45 10, 15 60, 15 110 C15 160, 45 200, 70 210 C80 214, 90 210, 100 200 C110 210, 120 214, 130 210 C155 200, 185 160, 185 110 C185 60, 155 10, 100 10Z" fill="#FF8200" stroke="#FFFFFF" stroke-width="4"/>
  
  <!-- Forehead T stripe -->
  <rect x="85" y="20" width="30" height="8" rx="2" fill="#FFFFFF"/>
  <rect x="95" y="20" width="10" height="45" rx="2" fill="#FFFFFF"/>
  
  <!-- Left eye hole -->
  <ellipse cx="65" cy="100" rx="28" ry="22" fill="#1a1a1a" stroke="#FFFFFF" stroke-width="3"/>
  <!-- Left eye flame decoration -->
  <path d="M40 88 C45 75, 55 72, 60 80" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <path d="M48 92 C52 82, 58 78, 62 84" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Right eye hole -->
  <ellipse cx="135" cy="100" rx="28" ry="22" fill="#1a1a1a" stroke="#FFFFFF" stroke-width="3"/>
  <!-- Right eye flame decoration -->
  <path d="M160 88 C155 75, 145 72, 140 80" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <path d="M152 92 C148 82, 142 78, 138 84" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Nose bridge -->
  <path d="M90 108 L100 125 L110 108" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Mouth opening -->
  <path d="M70 155 C75 170, 90 178, 100 178 C110 178, 125 170, 130 155" fill="#1a1a1a" stroke="#FFFFFF" stroke-width="3"/>
  
  <!-- Chin decoration - chevron -->
  <path d="M80 185 L100 195 L120 185" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Lacing ties at back -->
  <path d="M15 80 L5 75 M15 95 L5 90 M15 110 L5 105" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M185 80 L195 75 M185 95 L195 90 M185 110 L195 105" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Side stripe decorations -->
  <path d="M30 60 C25 80, 22 100, 25 130" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="8,4"/>
  <path d="M170 60 C175 80, 178 100, 175 130" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="8,4"/>
</svg>
